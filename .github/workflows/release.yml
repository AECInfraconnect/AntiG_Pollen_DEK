name: Release and SBOM

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build, SBOM, and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-pc-windows-msvc, aarch64-apple-darwin

      - name: Install cargo-sbom
        run: cargo install cargo-sbom

      - name: Build Workspace
        run: cargo build --release --workspace

      - name: Generate SBOM
        run: cargo sbom > sbom.json

      - name: Generate TUF Hashes
        run: |
          sha256sum target/release/dek-core > dek-core.sha256
          sha256sum target/release/dek-updater > dek-updater.sha256
          sha256sum target/release/dek-mcp-proxy > dek-mcp-proxy.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/release/dek-core
            target/release/dek-updater
            target/release/dek-mcp-proxy
            sbom.json
            dek-core.sha256
            dek-updater.sha256
            dek-mcp-proxy.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
