openapi: 3.1.0
info:
  title: Pollen DEK Control-Plane API
  version: 1.0.0
  contact:
    name: Pollen Platform Team
    url: https://your-cloud-domain.com
    email: platform@your-cloud-domain.com
  description: Contract between Pollen Cloud / Local Control Plane and the DEK edge enforcement plane.
tags:
  - name: Discovery
  - name: Bundles
  - name: Telemetry
paths:
  /.well-known/pollen-contract:
    get:
      operationId: ContractDiscoveryApi_getDiscovery
      description: Discover contract capabilities and supported protocol versions.
      parameters:
        - $ref: '#/components/parameters/PollenHeaders.contractVersion'
        - $ref: '#/components/parameters/PollenHeaders.deviceId'
        - $ref: '#/components/parameters/PollenHeaders.tenantId'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractDiscoveryResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollenError'
      tags:
        - Discovery
  /v1/telemetry/batches:
    post:
      operationId: TelemetryApi_ingestBatch
      description: Ingest a batch of telemetry events.
      parameters:
        - $ref: '#/components/parameters/PollenHeaders.contractVersion'
        - $ref: '#/components/parameters/PollenHeaders.deviceId'
        - $ref: '#/components/parameters/PollenHeaders.tenantId'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryIngestResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollenError'
      tags:
        - Telemetry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryBatchRequest'
  /v1/tenants/{tenant_id}/devices/{device_id}/bundles/latest:
    post:
      operationId: BundleApi_fetchLatest
      description: Fetch the latest signed policy bundle manifest for a device.
      parameters:
        - $ref: '#/components/parameters/PollenHeaders.contractVersion'
        - $ref: '#/components/parameters/PollenHeaders.deviceId'
        - $ref: '#/components/parameters/PollenHeaders.tenantId'
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleFetchResponse'
        '304':
          description: The client has made a conditional request and the resource has not been modified.
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollenError'
      tags:
        - Bundles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BundleFetchRequest'
components:
  parameters:
    PollenHeaders.contractVersion:
      name: X-Pollen-Contract-Version
      in: header
      required: true
      schema:
        type: string
    PollenHeaders.deviceId:
      name: X-Pollen-Device-Id
      in: header
      required: false
      schema:
        type: string
    PollenHeaders.tenantId:
      name: X-Pollen-Tenant-Id
      in: header
      required: false
      schema:
        type: string
  schemas:
    BundleFetchRequest:
      type: object
      required:
        - tenant_id
        - device_id
        - capabilities
      properties:
        tenant_id:
          type: string
        device_id:
          type: string
        current_generation:
          type: integer
          format: int32
        capabilities:
          type: array
          items:
            type: string
    BundleFetchResponse:
      type: object
      required:
        - schema_version
        - status
      properties:
        schema_version:
          type: string
          enum:
            - bundle-fetch-response.v1
        status:
          type: string
          enum:
            - not_modified
            - bundle_ready
        generation:
          type: integer
          format: int32
        envelope: {}
    ContractDiscoveryResponse:
      type: object
      required:
        - schema_version
        - supported
        - preferred
        - capabilities
      properties:
        schema_version:
          type: string
          enum:
            - contract-discovery.v1
        supported:
          type: array
          items:
            type: string
        preferred:
          type: string
        minimum_dek_version:
          type: string
        sunset:
          type: object
          unevaluatedProperties:
            type: string
        capabilities:
          type: array
          items:
            type: string
    PollenError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        trace_id:
          type: string
    TelemetryBatchRequest:
      type: object
      required:
        - schema_version
        - tenant_id
        - device_id
        - batch_id
        - events
      properties:
        schema_version:
          type: string
          enum:
            - telemetry-batch.v1
        tenant_id:
          type: string
        device_id:
          type: string
        batch_id:
          type: string
        events:
          type: array
          items: {}
    TelemetryIngestResponse:
      type: object
      required:
        - schema_version
        - accepted
        - rejected
      properties:
        schema_version:
          type: string
          enum:
            - telemetry-ingest-response.v1
        accepted:
          type: integer
          format: int32
        rejected:
          type: integer
          format: int32
        retry_after_seconds:
          type: integer
          format: int32
servers:
  - url: http://127.0.0.1:17891
    description: Local Control Plane / Mock Cloud
    variables: {}
  - url: https://api.pollen.cloud
    description: Pollen Cloud
    variables: {}
