[package]
license = "Apache-2.0"

name = "pii-redactor-plugin"
version = "0.1.0"
edition = "2021"


[lib]
crate-type = ["cdylib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"
once_cell = "1.19"


[[bin]]
name = "pii-redactor"
path = "src/main.rs"
