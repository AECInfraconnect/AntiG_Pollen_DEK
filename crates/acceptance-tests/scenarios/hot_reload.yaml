id: AT-HOTRELOAD-001
name: Hot reload should switch MCP tool from allow to deny
platforms:
  - linux
  - windows
  - macos
requires_admin: false
given:
  mock_cloud_profile: enterprise-basic
  enrolled_device: true
  active_bundle: allow_weather_tool_v1
when:
  - run_dek: true
  - call_mcp_tool:
      agent_id: agent.sales-assistant
      server_id: mcp.weather
      tool_name: weather.getForecast
      resource_uri: api://weather/current
  - publish_policy_bundle: deny_weather_tool_v2
  - wait_for_hot_reload: "5s"
  - call_mcp_tool:
      agent_id: agent.sales-assistant
      server_id: mcp.weather
      tool_name: weather.getForecast
      resource_uri: api://weather/current
then:
  - first_decision: "ALLOW"
  - second_decision: "DENY"
  - mock_cloud_has_decision_logs: 2
  - active_bundle_version: 2
  - no_process_crash: true
