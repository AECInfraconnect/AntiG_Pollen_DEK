id: AT-CHAOS-001
name: Telemetry spooler should buffer events during Mock Cloud outage and replay on recovery
platforms:
  - linux
  - windows
  - macos
requires_admin: false
given:
  mock_cloud_profile: enterprise-basic
  enrolled_device: true
  active_bundle: allow_weather_tool_v1
when:
  - run_dek: true
  - call_mcp_tool:
      agent_id: agent.chaos-monkey
      server_id: mcp.network
      tool_name: network.chaos
      resource_uri: api://chaos/outage
  # At this point, the mock cloud outage is simulated
  - call_mcp_tool:
      agent_id: agent.sales-assistant
      server_id: mcp.weather
      tool_name: weather.getForecast
      resource_uri: api://weather/current
  # DEK should spool this event since cloud is unavailable
  - call_mcp_tool:
      agent_id: agent.chaos-monkey
      server_id: mcp.network
      tool_name: network.chaos
      resource_uri: api://chaos/recover
  # Cloud is back online, wait for spooler to replay
  - wait_for_hot_reload: "10s"
then:
  - first_decision: "ALLOW" # The first tool call to trigger outage should succeed
  - second_decision: "ALLOW" # The tool call during outage should succeed (local decision)
  - mock_cloud_has_decision_logs: 3 # Outage trigger, actual call, recovery trigger
  - no_process_crash: true
