<!DOCTYPE html>
<html>
<head>
    <title>Decision Logs</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #eee; }
        .allow { color: green; font-weight: bold; }
        .deny { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Decision Logs</h1>
    <a href="/admin/dashboard">Back to Dashboard</a>
    <table>
        <tr>
            <th>Timestamp</th>
            <th>Device</th>
            <th>Principal</th>
            <th>Action</th>
            <th>Resource</th>
            <th>Decision</th>
            <th>Reason</th>
        </tr>
        {% for log in logs %}
        <tr>
            <td>{{ log.timestamp }}</td>
            <td>{{ log.device_id }}</td>
            <td>{{ log.principal }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.resource }}</td>
            <td class="{{ log.decision }}">{{ log.decision }}</td>
            <td>{{ log.reason }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
