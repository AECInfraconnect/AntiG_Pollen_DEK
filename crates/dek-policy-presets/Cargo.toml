[package]
name = "dek-policy-presets"
version = "1.0.0-beta.10"
edition = "2021"
description = "Policy presets for Pollen DEK (Rego, Cedar, OpenFGA)"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
schemars = "0.8"
anyhow = "1.0"
uuid = { version = "1.23.3", features = ["v4"] }
dek-domain-schema = { version = "0.1.0", path = "../dek-domain-schema" }
dek-control-plane-api = { version = "0.1.0", path = "../dek-control-plane-api" }
