[package]
license = "Apache-2.0"

name = "dek-updater"
version = "0.1.0"
edition = "2024"


[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
hex = "0.4"
rustls.workspace = true
chrono.workspace = true
clap = { version = "4.4", features = ["derive"] }
ureq = { version = "2.9", features = ["json"] }
semver = "1.0"
tar = "0.4"
flate2 = "1.0"
tempfile = "3"

[lints]
workspace = true

[[bin]]
name = "dek-updater"
path = "src/main.rs"
test = false

